apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kamerplanter
  namespace: argocd
spec:
  project: default
  sources:
    - path: charts/stable/projectcontour-mixin/
      repoURL: https://github.com/nolte/helm-charts-repo.git
      targetRevision: main
      helm:
        releaseName: projectcontour-mixin
        parameters:
          - name: httpProxy.create
            value: "false"
          - name: httpProxy.fqdn
            value: kamerplanter.smart-home.k8sservices.local
        valuesObject:
          httpProxy:
            create: false
            fqdn: kamerplanter.smart-home.k8sservices.local
            tls:
              secretName: cert-manager/wildcard-duckdns-org-tls
            routes:
              - services:
                  - name: kamerplanter-frontend
                    port: 80
              - conditions:
                  - prefix: /api
                enableWebsockets: true # Setting this to true enables websocket for all paths that match /websocket
                services:
                  - name: kamerplanter-frontend
                    port: 80  
    - chart: kamerplanter
      repoURL:  oci://ghcr.io/nolte/charts/kamerplanter
      targetRevision: 0.0.3
      helm:
        valuesObject:

          controllers:
            backend:
              containers:
                main:
                  envFrom:
                    - secretRef:
                        name: kamerplanter-secrets
                  env:
                    ARANGODB_HOST: kamerplanter-arangodb
                    ARANGODB_PORT: "8529"
                    ARANGODB_DATABASE: kamerplanter
                    ARANGODB_USERNAME: root
                    REDIS_URL: redis://kamerplanter-valkey:6379/0
                    CORS_ORIGINS: '["https://kamerplanter.just-a-lab.duckdns.org/"]'
                    KAMERPLANTER_MODE: light
            frontend:
              containers:
                main:
                  env:
                    KAMERPLANTER_MODE: light
            arangodb:
              containers:
                main:
                  envFrom:
                    - secretRef:
                        name: kamerplanter-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: kamerplanter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
