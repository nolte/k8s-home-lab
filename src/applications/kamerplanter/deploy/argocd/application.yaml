apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kamerplanter
  namespace: argocd
spec:
  project: default
  sources:
    - path: charts/stable/projectcontour-mixin/
      repoURL: https://github.com/nolte/helm-charts-repo.git
      targetRevision: main
      helm:
        releaseName: projectcontour-mixin
        parameters:
          - name: httpProxy.create
            value: "false"
          - name: httpProxy.fqdn
            value: kamerplanter.smart-home.k8sservices.local
        valuesObject:
          httpProxy:
            create: false
            fqdn: kamerplanter.smart-home.k8sservices.local
            tls:
              secretName: cert-manager/wildcard-duckdns-org-tls
            routes:
              - services:
                  - name: kamerplanter-frontend
                    port: 80
              - conditions:
                  - prefix: /api
                enableWebsockets: true # Setting this to true enables websocket for all paths that match /websocket
                services:
                  - name: kamerplanter-frontend
                    port: 80
    - path: helm/kamerplanter
      repoURL: https://github.com/nolte/kamerplanter.git
      targetRevision: v0.0.18
      helm:
        valuesObject:
          # Persistent image store (NFR-013 local-fs). Mounted at
          # /data/attachments (STORAGE_LOCAL_FS_ROOT) on the backend pod.
          # Override the chart default (20Gi) down to a 2Gi volume.
          persistence:
            backend-attachments:
              size: 2Gi
            # REQ-029-A — writable /tmp for the read-only inference-service.
            inference-service-tmp:
              enabled: true
          controllers:
            backend:
              # The chart's backend controller overrides defaultPodOptions'
              # securityContext (runAsUser/runAsGroup) and thereby drops the
              # fsGroup, so the backend-attachments PVC mounts as root:root and
              # the uid-1000 process can't write — storage health_check fails
              # and readiness stays 503. Re-add fsGroup so the volume is
              # group-owned by 1000 and writable.
              pod:
                securityContext:
                  fsGroup: 1000
              containers:
                main:
                  image:
                    tag: "0.0.18"
                  envFrom:
                    - secretRef:
                        name: kamerplanter-secrets
                    - secretRef:
                        name: kamerplanter-vapid
                  env:
                    CORS_ORIGINS: '["https://kamerplanter.just-a-lab.duckdns.org/"]'
                    INFERENCE_SERVICE_ENABLED: true
                    PEST_DETECTION_ENABLED: true
                    KAMERPLANTER_MODE: light
                    # REQ-034 §4a.3 — operator opt-in for the *external* Pl@ntNet
                    # recognition path in Light mode. Light mode (REQ-027) has no
                    # consent subsystem, so sending a gallery photo to a third
                    # party is a deliberate operator decision. Without this the
                    # backend reports Pl@ntNet as unavailable in the quality-check
                    # picker regardless of the configured PLANTNET_API_KEY.
                    IDENTIFICATION_EXTERNAL_IN_LIGHT_MODE: "true"
                    # REQ-029-A — where the backend reaches the DINOv2 inference
                    # service (single-release service name). INFERENCE_SERVICE_ENABLED
                    # is intentionally NOT set yet: the local recognition path is
                    # flipped on only AFTER the reference index is populated, else
                    # recognition returns no results. See the deploy doc.
                    INFERENCE_SERVICE_URL: "http://kamerplanter-inference-service:8000"
                  # Image upload decodes the photo in-memory (Pillow quality
                  # assessment); a few-MB JPEG balloons to 100+ MB decoded, so
                  # the chart's 256Mi limit OOMKills the pod on upload. Even the
                  # raised 1Gi limit still OOMKilled (exitCode 137) under real
                  # upload load, so bump to 2Gi.
                  resources:
                    requests:
                      cpu: 100m
                      memory: 512Mi
                    limits:
                      cpu: "1"
                      memory: 2Gi
            frontend:
              initContainers:
                init-runtime-config:
                  image:
                    tag: "0.0.18"
                  # The init container generates runtime-config.js consumed by
                  # the frontend; this is the ONLY place the mode takes effect.
                  env:
                    KAMERPLANTER_MODE: light
              containers:
                main:
                  image:
                    tag: "0.0.18"
            arangodb:
              containers:
                main:
                  resources:
                    requests:
                      cpu: 250m
                      memory: 512Mi
                    limits:
                      cpu: "1"
                      memory: 1Gi
            # celery-worker and celery-beat share the kamerplanter-backend
            # image; pin them to the same version as the backend.
            celery-worker:
              containers:
                main:
                  image:
                    tag: "0.0.18"
                  # REQ-029-A — the reference-image acquisition Celery task runs
                  # here and calls the inference-service directly (not gated by
                  # INFERENCE_SERVICE_ENABLED), so the worker needs the URL too.
                  env:
                    INFERENCE_SERVICE_URL: "http://kamerplanter-inference-service:8000"
                  # The worker does the same in-memory Pillow image decoding as
                  # the backend (thumbnail generation §8.2 + reference-image
                  # acquisition) with --concurrency=2, so the chart's 512Mi limit
                  # OOMKilled it repeatedly (exitCode 137). Match the backend's
                  # 2Gi headroom.
                  resources:
                    requests:
                      cpu: 100m
                      memory: 512Mi
                    limits:
                      cpu: "1"
                      memory: 2Gi
            celery-beat:
              containers:
                main:
                  image:
                    tag: "0.0.18"
            # REQ-029-A — DINOv2 recognition stack (single-release). Enabled here;
            # the chart ships both controllers disabled by default. The vectordb
            # pod will CrashLoop until kamerplanter-secrets carries POSTGRES_PASSWORD
            # (and the inference-service needs VECTORDB_PASSWORD in the same Secret).
            vectordb:
              enabled: true
            inference-service:
              enabled: true
              # Pin to the coordinated release tag like every other controller.
              # The chart default floats on ``:latest`` with pullPolicy
              # IfNotPresent, so a node that cached an older ``:latest`` never
              # re-pulls — the pod kept serving a pre-REQ-044 image without the
              # ``/pest/*`` routes, so /admin/pests/status reported the service
              # as unreachable. An explicit semver tag forces a fresh pull.
              containers:
                main:
                  image:
                    tag: "0.0.18"
          # REQ-029-A — expose the recognition controllers + lock down traffic.
          service:
            vectordb:
              enabled: true
            inference-service:
              enabled: true
          networkpolicies:
            vectordb:
              enabled: true
            inference-service:
              enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kamerplanter
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
