apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kamerplanter
  namespace: argocd
spec:
  project: default
  sources:
    - path: charts/stable/projectcontour-mixin/
      repoURL: https://github.com/nolte/helm-charts-repo.git
      targetRevision: main
      helm:
        releaseName: projectcontour-mixin
        parameters:
          - name: httpProxy.create
            value: "false"
          - name: httpProxy.fqdn
            value: kamerplanter.smart-home.k8sservices.local
        valuesObject:
          httpProxy:
            create: false
            fqdn: kamerplanter.smart-home.k8sservices.local
            tls:
              secretName: cert-manager/wildcard-duckdns-org-tls
            routes:
              - services:
                  - name: kamerplanter-frontend
                    port: 80
              - conditions:
                  - prefix: /api
                enableWebsockets: true # Setting this to true enables websocket for all paths that match /websocket
                services:
                  - name: kamerplanter-frontend
                    port: 80
    - path: helm/kamerplanter
      repoURL: https://github.com/nolte/kamerplanter.git
      targetRevision: v0.0.13
      helm:
        valuesObject:

          controllers:
            backend:
              containers:
                main:
                  image:
                    tag: "0.0.13"
                  env:
                    CORS_ORIGINS: '["https://kamerplanter.just-a-lab.duckdns.org/"]'
                    KAMERPLANTER_MODE: light
            frontend:
              initContainers:
                init-runtime-config:
                  image:
                    tag: "0.0.13"
              containers:
                main:
                  image:
                    tag: "0.0.13"
                  env:
                    KAMERPLANTER_MODE: light
            arangodb:
              containers:
                main:
                  resources:
                    requests:
                      cpu: 250m
                      memory: 512Mi
                    limits:
                      cpu: "1"
                      memory: 1Gi
            # celery-worker and celery-beat share the kamerplanter-backend
            # image; pin them to the same version as the backend.
            celery-worker:
              containers:
                main:
                  image:
                    tag: "0.0.13"
            celery-beat:
              containers:
                main:
                  image:
                    tag: "0.0.13"

  destination:
    server: https://kubernetes.default.svc
    namespace: kamerplanter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
